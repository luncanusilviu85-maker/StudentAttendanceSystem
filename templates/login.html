<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Student Attendance System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon"></div>
      <h1>Attendance System</h1>
      <p class="subtitle">Cloud-Native AWS Platform</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message | safe }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-footer">Student Attendance Management System &copy; 2025</p>
  </div>

</body>
</html>
